<!DOCTYPE html>
<html lang="fr" data-theme="light">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="global.css" />
  <title>DevDash</title>
</head>

<body class="theme-alt">
  <div class="dashboard">

    <aside class="sidebar">
      <h2>DevDash</h2>
      <nav>
        <a href="#">Dashboard</a>
        <a href="#">Users</a>
        <a href="#">Settings</a>
      </nav>
    </aside>

    <main class="main">
      <header class="header">
        <h1>Dashboard</h1>
        <button id="theme-toggle" class="button">Switch Theme</button>
      </header>

      <section class="cards">
        <div class="card">
          <h3>Users</h3>
          <p>1200</p>
        </div>

        <div class="card">
          <h3>Revenue</h3>
          <p>$34,000</p>
        </div>

        <div class="card">
          <h3>Errors</h3>
          <span class="badge error">12</span>
        </div>
      </section>

    </main>
  </div>

</body>

</html>
